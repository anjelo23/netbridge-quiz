<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0d1f3c"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00c8e0;stop-opacity:0.18"/>
      <stop offset="100%" style="stop-color:#00c8e0;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="glow2" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a8a;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#1a4a8a;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="bar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1a4a8a"/>
      <stop offset="100%" style="stop-color:#00c8e0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#00c8e0" stroke-width="1">
    <line x1="0" y1="40" x2="1200" y2="40"/>
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="280" x2="1200" y2="280"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="0" y1="360" x2="1200" y2="360"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="440" x2="1200" y2="440"/>
    <line x1="0" y1="480" x2="1200" y2="480"/>
    <line x1="0" y1="520" x2="1200" y2="520"/>
    <line x1="0" y1="560" x2="1200" y2="560"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="40" y1="0" x2="40" y2="630"/>
    <line x1="80" y1="0" x2="80" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/>
    <line x1="160" y1="0" x2="160" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/>
    <line x1="280" y1="0" x2="280" y2="630"/>
    <line x1="320" y1="0" x2="320" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="440" y1="0" x2="440" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/>
    <line x1="520" y1="0" x2="520" y2="630"/>
    <line x1="560" y1="0" x2="560" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="640" y1="0" x2="640" y2="630"/>
    <line x1="680" y1="0" x2="680" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/>
    <line x1="760" y1="0" x2="760" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/>
    <line x1="880" y1="0" x2="880" y2="630"/>
    <line x1="920" y1="0" x2="920" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1040" y1="0" x2="1040" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/>
    <line x1="1120" y1="0" x2="1120" y2="630"/>
    <line x1="1160" y1="0" x2="1160" y2="630"/>
  </g>

  <!-- Glow orbs -->
  <circle cx="1100" cy="-50" r="360" fill="url(#glow1)"/>
  <circle cx="100" cy="680" r="280" fill="url(#glow2)"/>

  <!-- Accent bar at top -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#bar)" rx="0"/>

  <!-- Event badge pill -->
  <rect x="80" y="72" width="246" height="34" rx="17" fill="rgba(0,200,224,0.12)" stroke="#00c8e0" stroke-width="1" stroke-opacity="0.3"/>
  <text x="203" y="94" font-family="'DM Mono', 'Courier New', monospace" font-size="12" fill="#00c8e0" text-anchor="middle" letter-spacing="2">INDUSTRY CONNECT</text>

  <!-- Main heading -->
  <text x="80" y="200" font-family="Figtree, 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="800" fill="#ffffff" letter-spacing="-2">Netbridge</text>
  <text x="80" y="285" font-family="Figtree, 'Helvetica Neue', Arial, sans-serif" font-size="74" font-weight="800" fill="#00c8e0" letter-spacing="-2">Quiz</text>

  <!-- Descriptor text -->
  <text x="80" y="356" font-family="Figtree, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#8a9bb5">How well do you know Netbridge?</text>
  <text x="80" y="390" font-family="Figtree, 'Helvetica Neue', Arial, sans-serif" font-size="22" font-weight="400" fill="#8a9bb5">5 questions. 30 seconds each. One attempt.</text>

  <!-- Stats pills -->
  <rect x="80" y="440" width="160" height="48" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="160" y="460" font-family="'DM Mono', monospace" font-size="11" fill="#8a9bb5" text-anchor="middle" letter-spacing="1">QUESTIONS</text>
  <text x="160" y="479" font-family="Figtree, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>

  <rect x="256" y="440" width="180" height="48" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="346" y="460" font-family="'DM Mono', monospace" font-size="11" fill="#8a9bb5" text-anchor="middle" letter-spacing="1">SECONDS EACH</text>
  <text x="346" y="479" font-family="Figtree, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">30</text>

  <rect x="452" y="440" width="180" height="48" rx="12" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  <text x="542" y="460" font-family="'DM Mono', monospace" font-size="11" fill="#8a9bb5" text-anchor="middle" letter-spacing="1">ATTEMPTS</text>
  <text x="542" y="479" font-family="Figtree, sans-serif" font-size="18" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>

  <!-- Large decorative Q on the right -->
  <text x="820" y="460" font-family="Figtree, sans-serif" font-size="420" font-weight="900" fill="rgba(0,200,224,0.06)" letter-spacing="-20">Q</text>

  <!-- Bottom bar with URL -->
  <rect x="0" y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>
  <text x="80" y="611" font-family="'DM Mono', monospace" font-size="14" fill="#8a9bb5" letter-spacing="1">netbridge.co.nz</text>
  <text x="1120" y="611" font-family="'DM Mono', monospace" font-size="14" fill="#00c8e0" text-anchor="end" letter-spacing="1">INDUSTRY CONNECT 2025</text>
</svg>
